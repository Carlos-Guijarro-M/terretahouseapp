services:
  php:
    build: .
    container_name: symfony_backend
    volumes:
      - .:/var/www/html
    ports:
      - "8000:8000"
    tty: true
    stdin_open: true
    command: php -S 0.0.0.0:8000 -t /var/www/html

  db:
    image: mysql:8.0
    container_name: db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: terretahousebbdd
    volumes:
      - db_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    depends_on:
      - db

volumes:
  db_data:
