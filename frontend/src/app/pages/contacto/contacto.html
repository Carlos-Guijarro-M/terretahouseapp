<div class="contacto">
  <section class="container py-5">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <h2 class="text-center mb-4">Envíanos un mensaje</h2>

        <form (ngSubmit)="enviarMensaje()">
          
          <div class="mb-3">
            <label for="nombre" class="form-label fw-bold">Nombre</label>
            <input type="text" id="nombre" name="nombre" class="form-control" [(ngModel)]="texto.nombre" placeholder="Tu nombre" required>
          </div>

          <div class="mb-3">
            <label for="correo" class="form-label fw-bold">Email</label>
            <input type="email" id="correo" name="correo" class="form-control" [(ngModel)]="texto.correo" placeholder="Tu email" required>
          </div>

          <div class="mb-3">
            <label for="mensaje" class="form-label fw-bold">Mensaje</label>
            <textarea id="mensaje" name="mensaje" class="form-control" rows="5" [(ngModel)]="texto.mensaje" placeholder="Escribe tu mensaje" required></textarea>
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-contacto btn-lg">
              Enviar
            </button>
          </div>
        </form>

      </div>
    </div>
  </section>
</div>
