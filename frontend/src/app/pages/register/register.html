<div class="register-container">

  <div class="register-card">
    <h2>Crear cuenta</h2>

    <form class="register-form" (submit)="register()">

      <div class="grupo-campo">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="formData.email" name="email" placeholder="Introduce tu email" required>
      </div>

      <div class="grupo-campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="formData.password" name="password" placeholder="Introduce tu contraseña" required>
      </div>

      <div class="grupo-campo">
        <label for="confirmarPassword">Confirmar contraseña</label>
        <input type="password" id="confirmarPassword" [(ngModel)]="formData.confirmarPassword" name="confirmarPassword" placeholder="Repite tu contraseña" required>
      </div>

      @if (error !== '') {
        <p class="mensaje-error">{{ error }}</p>
      }

      <button type="submit" class="btn-enviar">Registrarme</button>

      <p class="register-link">
        ¿Ya tienes cuenta?
        <a routerLink="/login">Inicia sesión</a>
      </p>

    </form>
  </div>

</div>
