<div class="login-container d-flex justify-content-center align-items-center min-vh-100 p-3">
  
  <div class="card shadow-sm p-4 login-card-box">
    <div class="card-body">
      <h2 class="text-center mb-4 fw-bold">Iniciar sesión</h2>

      <form (submit)="login()">
        <div class="mb-3">
          <label for="email" class="form-label fw-bold">Email</label>
          <input type="email" id="email" class="form-control" [(ngModel)]="formData.email" name="email" placeholder="Introduce tu email" required>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label fw-bold">Contraseña</label>
          <input type="password" id="password" class="form-control" [(ngModel)]="formData.password" name="password" placeholder="Introduce tu contraseña" required>
        </div>

        @if (error) {
          <div class="alert alert-danger p-2 text-center small fw-bold">
            {{ error }}
          </div>
        }

        <div class="mb-3 d-flex justify-content-center">
          <re-captcha (resolved)="resolved($event)"></re-captcha>
        </div>
        
        <button type="submit" class="btn btn-primary w-100 py-2 mt-2">Entrar</button>
        
        <p class="text-center mt-2 small text-muted">
          ¿Olvidaste tu contraseña? <a routerLink="/recuperar-password" class="fw-bold text-decoration-none custom-link">Recupérala aquí</a>
        </p>

        <p class="text-center mt-3 small text-muted">
          ¿No tienes cuenta? <a routerLink="/register" class="fw-bold text-decoration-none custom-link">Regístrate</a>
        </p>
      </form>
    </div>
  </div>
</div>
