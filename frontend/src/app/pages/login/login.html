<div class="login-container">

  <div class="login-card">
    <h2>Iniciar sesión</h2>

    <form class="login-form" (submit)="login()">
      
      <div class="grupo-campo">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="formData.email" name="email" placeholder="Introduce tu email" required>
      </div>

      <div class="grupo-campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" [(ngModel)]="formData.password" name="password" placeholder="Introduce tu contraseña" required>
      </div>

      @if (error) {
        <p class="mensaje-error">{{ error }}</p>
      }
      
      <button type="submit" class="btn-enviar">Entrar</button>

      <p class="login-link">
        ¿No tienes cuenta?
        <a routerLink="/register">Regístrate</a>
      </p>

    </form>
  </div>

</div>
