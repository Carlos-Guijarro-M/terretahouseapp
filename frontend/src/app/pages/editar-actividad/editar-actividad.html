<div class="gestion-actividades">
  <header class="hero-editar d-flex align-items-center justify-content-center text-white text-center">
    <h1>Modificar Actividad</h1>
  </header>

  <main class="container py-5">
    <section class="card p-4 shadow-sm">
      <h2 class="title-primary mb-4">Editando: {{ actividad.titulo }}</h2>

      <form (submit)="guardarCambios()" class="row g-3">
        <div class="col-md-6">
          <label class="form-label fw-bold">Título</label>
          <input type="text" class="form-control" [(ngModel)]="actividad.titulo" name="titulo" required />
        </div>
        <div class="col-md-6">
          <label class="form-label fw-bold">Provincia</label>
          <select class="form-select" [(ngModel)]="actividad.provincia" name="provincia" required>
            <option value="Valencia">Valencia</option>
            <option value="Castellón">Castellón</option>
            <option value="Alicante">Alicante</option>
          </select>
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Fecha</label>
          <input type="date" class="form-control" [(ngModel)]="actividad.fecha" name="fecha" required />
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Hora Inicio</label>
          <input type="time" class="form-control" [(ngModel)]="actividad.hora_inicio" name="hora_inicio" />
        </div>
        <div class="col-md-4">
          <label class="form-label fw-bold">Hora Fin</label>
          <input type="time" class="form-control" [(ngModel)]="actividad.hora_fin" name="hora_fin" />
        </div>
        <div class="col-md-12">
          <label class="form-label fw-bold">Descripción</label>
          <textarea class="form-control" [(ngModel)]="actividad.descripcion" name="descripcion"></textarea>
        </div>
        <div class="col-md-12">
          <label class="form-label fw-bold">Plazas Totales</label>
          <input type="number" class="form-control" [(ngModel)]="actividad.plazas_totales" name="plazas_totales" />
        </div>
        <div class="col-md-12">
          <label class="form-label fw-bold">Código Iframe del Mapa</label>
          <textarea class="form-control" [(ngModel)]="actividad.mapa_iframe" name="mapa_iframe" rows="2"></textarea>
        </div>
        
        <div class="col-md-9">
          <label class="form-label fw-bold">Imagen de la Actividad</label>
          @if (actividad.imagen_url) {
            <img [src]="actividad.imagen_url" 
                 [alt]="'Imagen de ' + actividad.titulo" 
                 [title]="actividad.titulo" 
                 class="preview-img d-block mb-2">
          }
          <input type="file" class="form-control" (change)="onImagenSeleccionada($event)" accept="image/*" />
        </div>

        <div class="col-md-3 d-flex align-items-end gap-2">
          <button type="submit" class="btn btn-primary-custom w-100">Guardar Cambios</button>
          <button type="button" class="btn btn-outline-secondary w-100" (click)="cancelar()">Cancelar</button>
        </div>
      </form>
    </section>
  </main>
</div>
