<div class="container py-5">
  <section class="card p-4 shadow-sm">
    <h2 class="text-primary mb-4">Gestión de Usuarios</h2>
    
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead class="table-dark">
          <tr>
            <th>Nombre y Apellidos</th>
            <th>Email</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          @for (u of usuarios; track u.id) {
            <tr>
              <td><strong>{{ u.nombre }} {{ u.apellidos }}</strong></td>
              <td>{{ u.email }}</td>
              <td>
                @if (u.baneado == 1) {
                  <span class="badge bg-danger">Baneado</span>
                } @else {
                  <span class="badge bg-success">Activo</span>
                }
              </td>
              <td>
                <div class="btn-group btn-group-sm">
                  <button class="btn btn-outline-warning" (click)="cambiarEstadoBaneo(u)">
                    {{ u.baneado == 1 ? 'Desbanear' : 'Banear' }}
                  </button>
                  <button class="btn btn-outline-danger" (click)="eliminarUsuario(u.id)">
                    Eliminar
                  </button>
                </div>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="text-center text-muted">No hay otros usuarios registrados.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </section>
</div>
