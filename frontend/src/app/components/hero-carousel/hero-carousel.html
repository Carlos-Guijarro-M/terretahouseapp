<div id="heroCarousel" class="carousel slide carousel-fade" data-bs-ride="carousel" data-bs-interval="5000">
  <div class="carousel-inner">
    
    <div class="carousel-item active">
      <div class="hero-slide" style="background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('/hero1-home.jpg');"></div>
    </div>
    
    @for (i of [2, 3, 4, 5]; track i) {
      <div class="carousel-item">
        <div class="hero-slide" [style.background-image]="'linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url(/hero' + i + '-home.jpg)'"></div>
      </div>
    }
  </div>

  <div class="carousel-caption d-flex flex-column align-items-center justify-content-center h-100">
    <h1 class="display-3 fw-bold text-white shadow-sm">Descubre la Comunidad Valenciana</h1>
  </div>
</div>
